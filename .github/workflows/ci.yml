name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '24'
  AWS_REGION: us-west-2
  ECR_REPO: quantara-dev-ingestion
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Typecheck shared
        run: npm run typecheck --workspace=@quantara/shared

      - name: Typecheck backend
        run: npm run typecheck --workspace=quantara-backend

      - name: Typecheck ingestion
        run: npm run typecheck --workspace=quantara-ingestion

      - name: Build backend
        run: npm run build --workspace=quantara-backend

      - name: Build ingestion
        run: npm run build --workspace=quantara-ingestion

      # Cache Next.js build output keyed on lockfile + web sources. Falls
      # back to lockfile-only restore so a source change reuses node_modules
      # and the .next/cache from the previous run instead of compiling cold.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('web/**/*.[jt]s', 'web/**/*.[jt]sx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build web
        run: npm run build --workspace=web

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Test backend (with coverage)
        run: npm run test:coverage --workspace=quantara-backend
        continue-on-error: true

      - name: Test ingestion (with coverage)
        run: npm run test:coverage --workspace=quantara-ingestion
        continue-on-error: true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            backend/coverage
            ingestion/coverage
          retention-days: 14

      # Compute statement-pct + color and expose as step outputs. The badge
      # JSON itself is written by Schneegans/dynamic-badges-action — we just
      # supply the parts.
      - name: Compute coverage percentages
        id: coverage
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          get_pct() {
            local dir=$1
            if [ -f "$dir/coverage/coverage-summary.json" ]; then
              node -e "const d=require('./$dir/coverage/coverage-summary.json'); console.log(Math.round(d.total.statements.pct))"
            else
              echo "0"
            fi
          }
          badge_color() {
            local pct=$1
            if [ "$pct" -ge 80 ]; then echo "brightgreen"
            elif [ "$pct" -ge 60 ]; then echo "green"
            elif [ "$pct" -ge 40 ]; then echo "yellow"
            elif [ "$pct" -ge 20 ]; then echo "orange"
            else echo "red"
            fi
          }
          BACKEND_PCT=$(get_pct backend)
          INGESTION_PCT=$(get_pct ingestion)
          {
            echo "backend_pct=${BACKEND_PCT}"
            echo "backend_color=$(badge_color $BACKEND_PCT)"
            echo "ingestion_pct=${INGESTION_PCT}"
            echo "ingestion_color=$(badge_color $INGESTION_PCT)"
          } >> "$GITHUB_OUTPUT"
          echo "Backend: ${BACKEND_PCT}%, Ingestion: ${INGESTION_PCT}%"

      - name: Publish backend coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.BADGES_GIST_ID }}
          filename: backend-coverage.json
          label: backend coverage
          message: ${{ steps.coverage.outputs.backend_pct }}%
          color: ${{ steps.coverage.outputs.backend_color }}

      - name: Publish ingestion coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.BADGES_GIST_ID }}
          filename: ingestion-coverage.json
          label: ingestion coverage
          message: ${{ steps.coverage.outputs.ingestion_pct }}%
          color: ${{ steps.coverage.outputs.ingestion_color }}

  deploy-dev:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [typecheck-and-build, test]
    runs-on: ubuntu-latest
    # `environment: dev` ties the job to the GitHub "dev" environment. To
    # require manual approval before each deploy, add yourself as a
    # required reviewer in Settings → Environments → dev.
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Backend API Lambda ---
      - name: Build backend
        run: npm run package --workspace=quantara-backend

      - name: Deploy backend Lambda
        run: |
          aws lambda update-function-code \
            --function-name quantara-dev-api \
            --zip-file fileb://backend/dist/lambda.zip \
            --region ${{ env.AWS_REGION }} || echo "Lambda not yet created — skipping"

      # --- Ingestion Lambdas ---
      - name: Package ingestion Lambdas
        run: npm run package --workspace=quantara-ingestion

      - name: Deploy ingestion Lambda
        run: |
          aws lambda update-function-code \
            --function-name quantara-dev-ingestion \
            --zip-file fileb://ingestion/dist/ingestion.zip \
            --region ${{ env.AWS_REGION }} || echo "Lambda not yet created — skipping"

      - name: Deploy backfill Lambda
        run: |
          aws lambda update-function-code \
            --function-name quantara-dev-backfill \
            --zip-file fileb://ingestion/dist/backfill.zip \
            --region ${{ env.AWS_REGION }} || echo "Lambda not yet created — skipping"

      - name: Deploy news-backfill Lambda
        run: |
          aws lambda update-function-code \
            --function-name quantara-dev-news-backfill \
            --zip-file fileb://ingestion/dist/news-backfill.zip \
            --region ${{ env.AWS_REGION }} || echo "Lambda not yet created — skipping"

      - name: Deploy enrichment Lambda
        run: |
          aws lambda update-function-code \
            --function-name quantara-dev-enrichment \
            --zip-file fileb://ingestion/dist/enrichment.zip \
            --region ${{ env.AWS_REGION }} || echo "Lambda not yet created — skipping"

      # --- Fargate ingestion service ---
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          ECR_URL=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}
          docker build -f ingestion/Dockerfile -t ${ECR_URL}:latest -t ${ECR_URL}:${{ github.sha }} .
          docker push ${ECR_URL}:latest
          docker push ${ECR_URL}:${{ github.sha }}

      - name: Force ECS redeploy
        run: |
          aws ecs update-service \
            --cluster quantara-dev-ingestion \
            --service quantara-dev-ingestion \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
