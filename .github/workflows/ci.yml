name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs on branches/PRs when a new push arrives — saves
# Actions minutes on superseded pushes. On `main`, cancel-in-progress is
# false to avoid cancelling a partially-deployed Lambda/ECS run mid-flight
# (which could leave code and infra out of sync). Deploy jobs additionally
# carry their own job-level concurrency groups.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  TF_VERSION: "1.14.0"
  AWS_REGION: us-west-2
  ECR_REPO: quantara-dev-ingestion

jobs:
  # Detect which paths changed so infra-only jobs (terraform plan/apply) skip
  # entirely on code-only PRs. Without this, every code merge would spin up
  # the apply job and request `dev-terraform` environment approval for a
  # no-op plan.
  changes:
    runs-on: ubuntu-latest
    # `pull-requests: read` is required by dorny/paths-filter — on PRs it
    # uses the GitHub API to list changed files. Without this it errors
    # with "Resource not accessible by integration".
    permissions:
      contents: read
      pull-requests: read
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'backend/infra/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format

  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            */node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install deps (skip if cached)
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Typecheck shared
        run: npm run typecheck --workspace=@quantara/shared

      - name: Typecheck backend
        run: npm run typecheck --workspace=quantara-backend

      - name: Typecheck ingestion
        run: npm run typecheck --workspace=quantara-ingestion

      - name: Build backend
        run: npm run build --workspace=quantara-backend

      - name: Build ingestion
        run: npm run build --workspace=quantara-ingestion

      # Cache Next.js build output keyed on lockfile + web sources. Falls
      # back to lockfile-only restore so a source change reuses node_modules
      # and the .next/cache from the previous run instead of compiling cold.
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('web/**/*.[jt]s', 'web/**/*.[jt]sx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build web
        run: npm run build --workspace=web

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            */node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install deps (skip if cached)
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Test backend (with coverage)
        run: npm run test:coverage --workspace=quantara-backend
        continue-on-error: true

      - name: Test ingestion (with coverage)
        run: npm run test:coverage --workspace=quantara-ingestion
        continue-on-error: true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-reports
          path: |
            backend/coverage
            ingestion/coverage
          retention-days: 14

      # Compute statement-pct + color and expose as step outputs. The badge
      # JSON itself is written by Schneegans/dynamic-badges-action — we just
      # supply the parts.
      - name: Compute coverage percentages
        id: coverage
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          get_pct() {
            local dir=$1
            if [ -f "$dir/coverage/coverage-summary.json" ]; then
              node -e "const d=require('./$dir/coverage/coverage-summary.json'); console.log(Math.round(d.total.statements.pct))"
            else
              echo "0"
            fi
          }
          badge_color() {
            local pct=$1
            if [ "$pct" -ge 80 ]; then echo "brightgreen"
            elif [ "$pct" -ge 60 ]; then echo "green"
            elif [ "$pct" -ge 40 ]; then echo "yellow"
            elif [ "$pct" -ge 20 ]; then echo "orange"
            else echo "red"
            fi
          }
          BACKEND_PCT=$(get_pct backend)
          INGESTION_PCT=$(get_pct ingestion)
          {
            echo "backend_pct=${BACKEND_PCT}"
            echo "backend_color=$(badge_color $BACKEND_PCT)"
            echo "ingestion_pct=${INGESTION_PCT}"
            echo "ingestion_color=$(badge_color $INGESTION_PCT)"
          } >> "$GITHUB_OUTPUT"
          echo "Backend: ${BACKEND_PCT}%, Ingestion: ${INGESTION_PCT}%"

      - name: Publish backend coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.BADGES_GIST_ID }}
          filename: backend-coverage.json
          label: backend coverage
          message: ${{ steps.coverage.outputs.backend_pct }}%
          color: ${{ steps.coverage.outputs.backend_color }}

      - name: Publish ingestion coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.BADGES_GIST_ID }}
          filename: ingestion-coverage.json
          label: ingestion coverage
          message: ${{ steps.coverage.outputs.ingestion_pct }}%
          color: ${{ steps.coverage.outputs.ingestion_color }}

  # PR-time terraform plan: posts the plan summary as a sticky comment so
  # reviewers see add/change/destroy counts before approving. Skipped on
  # fork PRs (the GitHubDeployRole trust allows `pull_request` broadly,
  # so a fork PR could otherwise assume Administrator credentials).
  plan-infra-dev:
    needs: changes
    if: |
      github.event_name == 'pull_request'
      && needs.changes.outputs.infra == 'true'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::442725244722:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      # The backend + ingestion zips need to exist before terraform plan
      # (it references the dist/*.zip + dist/index.js paths via archive_file
      # data sources). Without these, plan fails with "could not archive
      # missing file".
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build ingestion bundle (for archive_file data sources)
        run: npm run package --workspace=quantara-ingestion

      - name: Build backend bundle (for archive_file data sources)
        run: npm run package --workspace=quantara-backend

      - name: Terraform init
        working-directory: backend/infra/dev
        run: terraform init -input=false -no-color

      - name: Terraform plan
        id: plan
        working-directory: backend/infra/dev
        run: |
          terraform plan -input=false -no-color -out=/tmp/tfplan.bin
          terraform show -no-color /tmp/tfplan.bin > /tmp/plan-summary.txt

          # Capture the high-level summary (last few lines that say "Plan: X to add...")
          {
            echo "summary<<EOF"
            grep -E "^Plan:" /tmp/plan-summary.txt || echo "Plan: 0 to add, 0 to change, 0 to destroy."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        uses: actions/github-script@v7
        env:
          PLAN_SUMMARY: ${{ steps.plan.outputs.summary }}
        with:
          script: |
            const fs = require('fs');
            const fullPlan = fs.readFileSync('/tmp/plan-summary.txt', 'utf8');

            // Extract just the human-readable resource-change lines for a focused comment.
            // The full plan is uploaded as an artifact for deep review if needed.
            const lines = fullPlan.split('\n');
            const summary = process.env.PLAN_SUMMARY.trim();

            const replaceLines = lines
              .filter((l) => l.match(/must be replaced|will be (created|destroyed|updated)/))
              .map((l) => l.trim())
              .slice(0, 80); // cap for comment-size sanity

            const body = [
              '## Terraform plan — `backend/infra/dev`',
              '',
              '```',
              summary,
              '```',
              '',
              replaceLines.length > 0
                ? '<details><summary>Resource changes (top 80)</summary>\n\n```\n' + replaceLines.join('\n') + '\n```\n</details>'
                : '_No resource-level changes detected._',
              '',
              'Full plan uploaded as workflow artifact. Apply will run on main merge after `dev-terraform` environment approval.',
              '',
              '🤖 Generated by `plan-infra-dev` (ci.yml)',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            // Look for an existing plan comment from this workflow and update it
            // rather than spam the PR with a new comment per push. Paginate so
            // we find the marker on busy PRs with >30 comments.
            const marker = '## Terraform plan — `backend/infra/dev`';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }

      - name: Upload full plan as artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.event.pull_request.number }}
          path: |
            /tmp/plan-summary.txt
          retention-days: 14

  # Deploy app code on every push to main once tests pass.
  # `aws lambda update-function-code` is last-write-wins, so two close-
  # together merges should kill the older in-flight run and let the newer
  # commit's bundle ship — that's why `cancel-in-progress: true`.
  deploy-code-dev:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, typecheck-and-build, test]
    runs-on: ubuntu-latest
    # `environment: dev` ties the job to the GitHub "dev" environment. To
    # require manual approval before each deploy, add yourself as a
    # required reviewer in Settings → Environments → dev.
    environment: dev
    concurrency:
      group: deploy-code-dev
      cancel-in-progress: true
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            */node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install deps (skip if cached)
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Backend API Lambda ---
      - name: Build backend
        run: npm run package --workspace=quantara-backend

      - name: Deploy backend Lambda
        run: |
          aws lambda update-function-code \
            --function-name quantara-dev-api \
            --zip-file fileb://backend/dist/lambda.zip \
            --region ${{ env.AWS_REGION }} || echo "Lambda not yet created — skipping"

      # --- Ingestion Lambdas ---
      - name: Package ingestion Lambdas
        run: npm run package --workspace=quantara-ingestion

      - name: Deploy ingestion Lambda
        run: |
          aws lambda update-function-code \
            --function-name quantara-dev-ingestion \
            --zip-file fileb://ingestion/dist/ingestion.zip \
            --region ${{ env.AWS_REGION }} || echo "Lambda not yet created — skipping"

      - name: Deploy backfill Lambda
        run: |
          aws lambda update-function-code \
            --function-name quantara-dev-backfill \
            --zip-file fileb://ingestion/dist/backfill.zip \
            --region ${{ env.AWS_REGION }} || echo "Lambda not yet created — skipping"

      - name: Deploy news-backfill Lambda
        run: |
          aws lambda update-function-code \
            --function-name quantara-dev-news-backfill \
            --zip-file fileb://ingestion/dist/news-backfill.zip \
            --region ${{ env.AWS_REGION }} || echo "Lambda not yet created — skipping"

      - name: Deploy enrichment Lambda
        run: |
          aws lambda update-function-code \
            --function-name quantara-dev-enrichment \
            --zip-file fileb://ingestion/dist/enrichment.zip \
            --region ${{ env.AWS_REGION }} || echo "Lambda not yet created — skipping"

      # --- Fargate ingestion service ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ingestion/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Force ECS redeploy
        run: |
          aws ecs update-service \
            --cluster quantara-dev-ingestion \
            --service quantara-dev-ingestion \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

  # Deploy infra (terraform apply) on every push to main once tests pass and
  # only when backend/infra/** actually changed. Sibling to deploy-code-dev,
  # gated by the `dev-terraform` environment for human approval before any
  # destructive op fires. `cancel-in-progress: false` because cancelling
  # terraform mid-apply could leave state pointing at half-applied resources.
  #
  # Required setup (one-time, org-admin):
  #   - GitHub environment `dev-terraform` with required reviewers
  #     (Settings → Environments → New environment → Required reviewers).
  deploy-infra-dev:
    needs: [lint, typecheck-and-build, test, changes]
    if: |
      github.ref == 'refs/heads/main'
      && github.event_name == 'push'
      && needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    environment: dev-terraform
    concurrency:
      group: deploy-infra-dev
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::442725244722:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      # The ingestion zips need to exist before terraform apply (it references
      # the dist/*.zip paths via archive_file data sources). Build them here
      # so apply has fresh artifacts.
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build ingestion bundle (for terraform_data triggers)
        run: npm run package --workspace=quantara-ingestion

      - name: Build backend bundle (for terraform_data triggers)
        run: npm run package --workspace=quantara-backend

      - name: Terraform init
        working-directory: backend/infra/dev
        run: terraform init -input=false -no-color

      - name: Terraform plan + apply
        working-directory: backend/infra/dev
        run: |
          terraform plan -input=false -no-color -out=/tmp/tfplan.bin
          terraform apply -input=false -no-color /tmp/tfplan.bin
