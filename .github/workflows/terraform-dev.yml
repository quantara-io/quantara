name: Terraform (dev)

# Two-stage Terraform workflow for the dev environment:
#
#   1. PR-time `plan`     — runs on PRs that touch backend/infra/**, posts the
#                           plan summary as a PR comment so reviewers see
#                           destructive ops before approving.
#
#   2. Main-merge `apply` — runs on push to main when backend/infra/** changed,
#                           saves the plan, then applies it. Gated by the
#                           `dev-terraform` GitHub environment so destructive
#                           changes still require human approval before fire.
#
# The deploy-dev job in ci.yml continues to handle fast Lambda code updates
# via `aws lambda update-function-code`. terraform-apply complements it by
# creating new resources, updating IAM, etc. They can run in parallel
# because they target different operations.
#
# Reuses the existing `GitHubDeployRole` in the dev account (442725244722) —
# same role the `deploy-dev` job in ci.yml uses. It already has
# `AdministratorAccess` and trusts both `pull_request` events and
# `ref:refs/heads/main`, so Terraform can read state from
# `quantara-tf-state-dev` and provision managed resources with no extra IAM
# setup. ARN is hardcoded (it's not a secret, just an account ID + role
# name) because using `vars.AWS_DEPLOY_ROLE_ARN` would require declaring
# `environment: dev` to inherit the env-scoped variable, which would gate
# every PR plan on the dev environment's reviewer approval.
#
# Required setup (one-time, org-admin):
#   - Create GitHub environment `dev-terraform` with required reviewers
#     (Settings → Environments → New environment → Required reviewers).
#     This is what gates `apply` behind human approval.

on:
  pull_request:
    paths:
      - "backend/infra/**"
      - ".github/workflows/terraform-dev.yml"
  # `push` paths intentionally exclude the workflow file itself — editing
  # this workflow on main shouldn't fire `terraform apply`. Infra changes
  # remerged on main will still trigger apply via `backend/infra/**`.
  push:
    branches:
      - main
    paths:
      - "backend/infra/**"

env:
  TF_VERSION: 1.14.0
  AWS_REGION: us-west-2

jobs:
  # ---------------------------------------------------------------------------
  # PR-time plan: comment the plan summary on the PR so reviewers see what
  # will change. Does NOT apply.
  # ---------------------------------------------------------------------------
  plan:
    # Skip plan on PRs from forks. The trust policy on `GitHubDeployRole`
    # allows any `pull_request` from this repo to assume the role (which
    # has AdministratorAccess in dev), so a fork PR that modified this
    # workflow could exfiltrate / abuse credentials. Internal PRs from
    # branches in this repo are still allowed.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::442725244722:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      # The backend + ingestion zips need to exist before terraform plan
      # (it references the dist/*.zip + dist/index.js paths via archive_file
      # data sources). Without these, plan fails with "could not archive
      # missing file".
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build ingestion bundle (for archive_file data sources)
        run: npm run package --workspace=quantara-ingestion

      - name: Build backend bundle (for archive_file data sources)
        run: npm run package --workspace=quantara-backend

      - name: Terraform init
        working-directory: backend/infra/dev
        run: terraform init -input=false -no-color

      - name: Terraform plan
        id: plan
        working-directory: backend/infra/dev
        run: |
          terraform plan -input=false -no-color -out=/tmp/tfplan.bin
          terraform show -no-color /tmp/tfplan.bin > /tmp/plan-summary.txt

          # Capture the high-level summary (last few lines that say "Plan: X to add...")
          {
            echo "summary<<EOF"
            grep -E "^Plan:" /tmp/plan-summary.txt || echo "Plan: 0 to add, 0 to change, 0 to destroy."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        uses: actions/github-script@v7
        env:
          PLAN_SUMMARY: ${{ steps.plan.outputs.summary }}
        with:
          script: |
            const fs = require('fs');
            const fullPlan = fs.readFileSync('/tmp/plan-summary.txt', 'utf8');

            // Extract just the human-readable resource-change lines for a focused comment.
            // The full plan is uploaded as an artifact for deep review if needed.
            const lines = fullPlan.split('\n');
            const summary = process.env.PLAN_SUMMARY.trim();

            const replaceLines = lines
              .filter((l) => l.match(/must be replaced|will be (created|destroyed|updated)/))
              .map((l) => l.trim())
              .slice(0, 80); // cap for comment-size sanity

            const body = [
              '## Terraform plan — `backend/infra/dev`',
              '',
              '```',
              summary,
              '```',
              '',
              replaceLines.length > 0
                ? '<details><summary>Resource changes (top 80)</summary>\n\n```\n' + replaceLines.join('\n') + '\n```\n</details>'
                : '_No resource-level changes detected._',
              '',
              'Full plan uploaded as workflow artifact. Apply will run on main merge after `dev-terraform` environment approval.',
              '',
              '🤖 Generated by `terraform-dev.yml`',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            // Look for an existing plan comment from this workflow and update it
            // rather than spam the PR with a new comment per push. Paginate so
            // we find the marker on busy PRs with >30 comments.
            const marker = '## Terraform plan — `backend/infra/dev`';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }

      - name: Upload full plan as artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.event.pull_request.number }}
          path: |
            /tmp/plan-summary.txt
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Main-merge apply: gated by `dev-terraform` GitHub environment so
  # destructive changes require human approval. Plan + apply are sequenced in
  # the same job so what gets applied is exactly what was just planned.
  #
  # Concurrency: never run two applies at once. The DynamoDB lock table
  # (`quantara-tf-locks-dev`) already prevents state corruption, but a queued
  # second runner still spins up paid compute and can time out waiting for
  # the lock. `cancel-in-progress: false` is critical — cancelling a running
  # apply mid-flight could leave terraform state pointing at half-applied
  # resources. Always queue, never cancel.
  # ---------------------------------------------------------------------------
  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev-terraform
    concurrency:
      group: terraform-dev-apply
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::442725244722:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      # The ingestion zips need to exist before terraform apply (it references
      # the dist/*.zip paths). Build them here so the apply has fresh artifacts.
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build ingestion bundle (for terraform_data triggers)
        run: npm run package --workspace=quantara-ingestion

      - name: Build backend bundle (for terraform_data triggers)
        run: npm run package --workspace=quantara-backend

      - name: Terraform init
        working-directory: backend/infra/dev
        run: terraform init -input=false -no-color

      - name: Terraform plan + apply
        working-directory: backend/infra/dev
        run: |
          terraform plan -input=false -no-color -out=/tmp/tfplan.bin
          terraform apply -input=false -no-color /tmp/tfplan.bin
