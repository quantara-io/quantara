name: Auto-request Copilot review

# Free-tier workaround for the rulesets-based "Request review from Copilot"
# feature (which requires GitHub Team or higher to enforce on private repos).
# This workflow fires on every non-draft PR and asks the Copilot reviewer bot
# to look at the diff.
#
# Why GraphQL and not the REST `requested_reviewers` endpoint:
#   The Copilot bot is not a repo collaborator, so the REST request returns
#   422 ("Reviews may only be requested from collaborators") rather than
#   actually adding the reviewer. The previous version of this workflow
#   silently swallowed that 422 as "already requested" and reported success
#   on every run, even though Copilot was never being added — see #210
#   diagnosis. The GraphQL `requestReviews` mutation accepts a `botIds`
#   list and is the documented path for assigning bot reviewers.
#
# Copilot's review is advisory — it does not block merge. Existing flows
# (quantara-reviewer subagent, codex second-opinion, human review) still apply.
#
# Triggers:
#   - opened / reopened / ready_for_review: initial review on PR creation
#   - synchronize: re-review after a push. When a reviewer submits a review
#     GitHub removes them from the requested list, so re-pushing the request
#     prompts Copilot to look at the new diff. The mutation is idempotent —
#     re-requesting an already-requested reviewer is a no-op.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  pull-requests: write

env:
  # The Copilot reviewer bot's stable GraphQL node ID. Discovered via the
  # `author { ... on Bot { id } }` field on an existing Copilot review (see
  # GraphQL probe in #210 / fix/copilot-review-graphql). Hardcoding is fine —
  # this is the public bot account; the ID does not rotate.
  COPILOT_BOT_ID: BOT_kgDOCnlnWA

jobs:
  request:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    # Best-effort: Copilot review is advisory. If the workflow can't add
    # Copilot (typically because GITHUB_TOKEN lacks scope and no PAT is
    # configured), log loudly but don't fail the job — we don't want a
    # noisy red check on every PR for a non-blocking nicety.
    continue-on-error: true
    steps:
      - name: Request Copilot as reviewer (GraphQL)
        env:
          # Prefer a fine-grained PAT (`COPILOT_REVIEW_TOKEN` repo secret,
          # scoped to "Pull requests: Read and write") because the default
          # GITHUB_TOKEN cannot add bot reviewers via `requestReviews` —
          # the mutation appears to succeed but returns an empty reviewer
          # set. Fall back to GITHUB_TOKEN if the PAT isn't configured;
          # the script will detect the empty-set failure mode and surface
          # the setup instructions in the log.
          GH_TOKEN: ${{ secrets.COPILOT_REVIEW_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NODE_ID: ${{ github.event.pull_request.node_id }}
        run: |
          set -e
          # `union: true` means "add the bot to the existing reviewer set"
          # rather than replacing it — so we don't accidentally evict
          # quantara-reviewer or human reviewers that are already requested.
          # Page size 100 covers any realistic reviewer set — GitHub's hard
          # cap is 15 pending reviewers per PR, so even 50 would be safe;
          # 100 leaves headroom in case GitHub raises the cap. Without enough
          # page size, Copilot could legitimately be requested but fall
          # outside the response page, and the post-mutation check would
          # incorrectly treat that as "not added".
          gh api graphql \
            -f query='
              mutation($pr:ID!, $bots:[ID!]) {
                requestReviews(input:{
                  pullRequestId: $pr
                  botIds: $bots
                  union: true
                }) {
                  pullRequest {
                    number
                    reviewRequests(first:100) {
                      nodes {
                        requestedReviewer {
                          __typename
                          ... on Bot { login }
                          ... on User { login }
                        }
                      }
                    }
                  }
                }
              }' \
            -f pr="$PR_NODE_ID" \
            -F bots="$COPILOT_BOT_ID" \
            > /tmp/result.json

          # Always log the response body so any silent-no-op surface (e.g.
          # token-scope issue, bot rejected) is visible in the run log
          # rather than masked behind a green check.
          echo "::group::Mutation response"
          cat /tmp/result.json
          echo
          echo "::endgroup::"

          # Parse the reviewer set with `jq` instead of `grep` so the check
          # is structural (matches the GraphQL response shape) rather than
          # textual (could false-positive on the name appearing in a comment
          # or false-negative on whitespace/escaping changes). gh exits
          # non-zero on GraphQL errors so `set -e` would have aborted
          # earlier — what we're guarding against here is a "successful"
          # response that doesn't actually contain the bot.
          REVIEWER_LOGINS=$(jq -r \
            '.data.requestReviews.pullRequest.reviewRequests.nodes[]?.requestedReviewer.login // empty' \
            /tmp/result.json)
          REVIEWER_COUNT=$(printf '%s\n' "$REVIEWER_LOGINS" | grep -c . || true)

          if printf '%s\n' "$REVIEWER_LOGINS" | grep -Fxq "copilot-pull-request-reviewer"; then
            echo "✅ Copilot is now in the requested-reviewers set ($REVIEWER_COUNT total)"
          elif [ "$REVIEWER_COUNT" = "0" ]; then
            # Empty reviewer set + we union'd Copilot in → mutation didn't
            # actually add the bot. The default GITHUB_TOKEN can't assign
            # Copilot via requestReviews; a PAT is required.
            echo "::warning title=Copilot reviewer not added::Mutation returned an empty reviewer set despite union:true."
            echo ""
            echo "The default \`GITHUB_TOKEN\` cannot add Copilot as a reviewer via \`requestReviews\`."
            echo "To enable auto-Copilot review on every PR, create a fine-grained PAT and store it as a"
            echo "repo secret named \`COPILOT_REVIEW_TOKEN\`:"
            echo ""
            echo "  1. github.com → Settings → Developer settings → Personal access tokens → Fine-grained"
            echo "  2. Repository access: Only quantara-io/quantara"
            echo "  3. Permissions → Repository → Pull requests: Read and write"
            echo "  4. Copy the token; in repo Settings → Secrets and variables → Actions → New secret:"
            echo "       Name:  COPILOT_REVIEW_TOKEN"
            echo "       Value: <the PAT>"
            echo ""
            echo "Until that's set, this workflow will continue to no-op on every PR."
            echo "(continue-on-error: true is set so this warning does not fail the check.)"
          else
            # Other reviewers present but not Copilot → already reviewed,
            # GitHub removed Copilot from the requested list. Not an error.
            echo "ℹ️ Copilot is not in the requested set but $REVIEWER_COUNT other reviewer(s) are. Likely already reviewed; mutation succeeded."
          fi
