name: Auto-request Copilot review

# Free-tier workaround for the rulesets-based "Request review from Copilot" feature
# (which requires GitHub Team or higher to enforce on private repos). This workflow
# fires on every non-draft PR and asks the Copilot reviewer bot to look at the diff.
#
# Copilot's review is advisory — it does not block merge. Existing flows
# (quantara-reviewer subagent, codex second-opinion, human review) still apply.

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  request:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Request Copilot as reviewer
        run: |
          set -e
          # Request the Copilot bot. The API treats this like any other reviewer
          # request; on success it returns 201 with the updated reviewer list.
          # If Copilot is already a requested reviewer or has already reviewed,
          # the API returns 422 — treat that as a no-op success.
          response=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers" \
            -d '{"reviewers":["copilot-pull-request-reviewer"]}')

          if [ "$response" = "201" ] || [ "$response" = "200" ]; then
            echo "✅ Copilot review requested (HTTP $response)"
          elif [ "$response" = "422" ]; then
            echo "ℹ️ Copilot already requested or reviewed (HTTP 422) — no-op"
          else
            echo "⚠️ Unexpected response from GitHub API: HTTP $response"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
